<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrichment Router</title>
<style>
  :root {
    --bg: #fafafa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --border: #e5e7eb;
    --success: #059669;
    --warn: #d97706;
    --error: #dc2626;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
    padding: 32px 20px 28px;
    text-align: center;
  }

  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -.02em;
  }

  .header p {
    margin-top: 6px;
    opacity: .85;
    font-size: .95rem;
    max-width: 560px;
    margin-inline: auto;
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  label {
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    font-size: .85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .03em;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .95rem;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
  }

  textarea { resize: vertical; min-height: 64px; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-grid-3 { grid-template-columns: repeat(3, 1fr); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-weight: 600;
    font-size: .95rem;
    transition: background .15s, transform .05s;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(.98); }

  .btn-outline {
    background: none;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-weight: 500;
    font-size: .85rem;
  }

  .btn-outline:hover { background: #f3f4f6; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .9rem;
  }

  th, td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  th {
    background: #f9fafb;
    font-weight: 600;
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: .03em;
    color: var(--text-muted);
  }

  tr:hover td { background: #fafaff; }

  .mono { font-family: "SF Mono", "Cascadia Code", Consolas, monospace; font-size: .88em; }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: .78rem;
    font-weight: 600;
  }

  .badge-ok { background: #d1fae5; color: var(--success); }
  .badge-partial { background: #fef3c7; color: var(--warn); }
  .badge-err { background: #fee2e2; color: var(--error); }
  .badge-tier { background: #eef2ff; color: var(--accent); }

  .stat-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin: 16px 0 12px;
  }

  .stat {
    background: #f9fafb;
    border-radius: 6px;
    padding: 12px 16px;
    min-width: 120px;
  }

  .stat-value {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .trace-row { background: #f5f3ff; }
  .trace-row td { padding: 14px 16px; font-size: .85rem; }

  .trace-event {
    margin-bottom: 10px;
    padding: 10px 14px;
    background: #fff;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .trace-event strong {
    color: var(--accent);
    font-size: .88rem;
  }

  .trace-event pre {
    background: #f3f4f6;
    padding: 8px 12px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: .78rem;
    margin-top: 6px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 24px;
    font-size: .9rem;
  }

  .flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Enrichment Router</h1>
  <p>A cost-and-latency-aware agent that fills in missing company data through heuristic → Wikipedia → LLM tiers, stopping when fields are resolved or the budget runs out.</p>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">📋 New Enrichment Request</div>
    <form id="enrich-form">
      <div class="form-grid">
        <div>
          <label for="name">Company Name *</label>
          <input type="text" id="name" name="name" placeholder="e.g. Stripe" required>
        </div>
        <div>
          <label for="domain">Domain</label>
          <input type="text" id="domain" name="domain" placeholder="e.g. stripe.com">
        </div>
      </div>
      <div class="form-grid">
        <div>
          <label for="industry">Industry</label>
          <input type="text" id="industry" name="industry" placeholder="leave blank to enrich">
        </div>
        <div>
          <label for="country">Country</label>
          <input type="text" id="country" name="country" placeholder="leave blank to enrich">
        </div>
        <div>
          <label for="is_public">Public Company</label>
          <select id="is_public" name="is_public">
            <option value="">Not specified</option>
            <option value="true">Yes</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
      <div style="margin-bottom: 16px;">
        <label for="short_description">Short Description</label>
        <textarea id="short_description" name="short_description" placeholder="leave blank to enrich"></textarea>
      </div>
      <div class="form-grid form-grid-3">
        <div>
          <label for="max_cost_usd">Max Cost (USD)</label>
          <input type="number" id="max_cost_usd" name="max_cost_usd" value="0.01" min="0.0001" step="0.0001">
        </div>
        <div>
          <label for="max_latency_ms">Max Latency (ms)</label>
          <input type="number" id="max_latency_ms" name="max_latency_ms" value="5000" min="100" step="100">
        </div>
        <div style="display: flex; align-items: flex-end;">
          <button type="submit" class="btn">🚀 Enrich</button>
        </div>
      </div>
    </form>
  </div>

  <div class="card" id="result-card" style="display:none;">
    <div class="flex-between" style="margin-bottom: 16px;">
      <div class="card-title" style="margin-bottom: 0;">📊 Result</div>
    </div>
    <div id="result"></div>
  </div>

  <div class="card">
    <div class="flex-between" style="margin-bottom: 16px;">
      <div class="card-title" style="margin-bottom: 0;">📜 Past Runs</div>
      <button class="btn-outline" onclick="refreshRuns()">Refresh</button>
    </div>
    <div id="runs"></div>
  </div>
</div>

<script>
function fmt(n, d) {
  return Number(n).toFixed(d);
}

function badgeClass(status) {
  const m = { 'done_all_resolved': 'badge-ok', 'partial_budget': 'badge-partial', 'partial_no_more_tiers': 'badge-partial', 'no_runs': 'badge-err' };
  return m[status] || 'badge-err';
}

function statusLabel(s) {
  const m = { 'done_all_resolved': 'Complete', 'partial_budget': 'Partial (budget)', 'partial_no_more_tiers': 'Partial (no tiers)', 'no_runs': 'No runs' };
  return m[s] || s;
}

function tierLabel(f) {
  if (f.caller_supplied) return 'Caller';
  return 'T' + f.tier;
}

async function handleSubmit(e) {
  e.preventDefault();
  const f = e.target;
  const body = {
    name: f.name.value,
    max_cost_usd: parseFloat(f.max_cost_usd.value),
    max_latency_ms: parseFloat(f.max_latency_ms.value)
  };
  if (f.domain.value) body.domain = f.domain.value;
  if (f.industry.value) body.industry = f.industry.value;
  if (f.country.value) body.country = f.country.value;
  if (f.short_description.value) body.short_description = f.short_description.value;
  const pub = f.is_public.value;
  if (pub === 'true') body.is_public = true;
  else if (pub === 'false') body.is_public = false;

  const card = document.getElementById('result-card');
  const el = document.getElementById('result');

  try {
    const resp = await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (!resp.ok) {
      el.innerHTML = '<div class="empty-state" style="color: var(--error);">' + (data.detail || 'Request failed') + '</div>';
    } else {
      renderResult(data, el);
    }
  } catch (err) {
    el.innerHTML = '<div class="empty-state" style="color: var(--error);">Network error: ' + err.message + '</div>';
  }
  card.style.display = '';
}

function renderResult(data, el) {
  let h = '';
  h += '<div class="stat-row">';
  h += '<div class="stat"><div class="stat-value">' + data.run_id + ' / ' + data.record_id + '</div><div class="stat-label">Run / Record IDs</div></div>';
  h += '<div class="stat"><div class="stat-value">$' + fmt(data.total_cost_usd, 6) + '</div><div class="stat-label">Total Cost</div></div>';
  h += '<div class="stat"><div class="stat-value">' + fmt(data.total_latency_ms, 1) + ' ms</div><div class="stat-label">Total Latency</div></div>';
  h += '<div class="stat"><div class="stat-value"><span class="badge ' + badgeClass(data.status) + '">' + statusLabel(data.status) + '</span></div><div class="stat-label">Status</div></div>';
  h += '</div>';

  if (data.resolved && data.resolved.length) {
    h += '<table><thead><tr><th>Field</th><th>Value</th><th>Source</th><th>Confidence</th></tr></thead><tbody>';
    for (const f of data.resolved) {
      h += '<tr>';
      h += '<td><strong>' + f.name + '</strong></td>';
      h += '<td>' + String(f.value) + '</td>';
      h += '<td><span class="badge badge-tier">' + tierLabel(f) + '</span></td>';
      h += '<td class="mono">' + fmt(f.confidence, 2) + '</td>';
      h += '</tr>';
    }
    h += '</tbody></table>';
  }

  if (data.unresolved_fields && data.unresolved_fields.length) {
    h += '<p style="margin-top: 12px;"><strong>Unresolved:</strong> ' + data.unresolved_fields.join(', ') + '</p>';
  }

  el.innerHTML = h;
}

async function refreshRuns() {
  const el = document.getElementById('runs');
  try {
    const resp = await fetch('/api/records');
    if (!resp.ok) {
      el.innerHTML = '<div class="empty-state">Failed to load runs</div>';
      return;
    }
    const data = await resp.json();
    renderRunsTable(data, el);
  } catch (err) {
    el.innerHTML = '<div class="empty-state">Network error: ' + err.message + '</div>';
  }
}

function renderRunsTable(records, el) {
  if (!records.length) {
    el.innerHTML = '<div class="empty-state">No runs yet. Submit a company above.</div>';
    return;
  }
  let h = '<table id="runs-table"><thead><tr><th>ID</th><th>Name</th><th>Status</th><th>Resolved</th><th>Cost</th><th>Latency</th><th>Created</th><th></th></tr></thead><tbody>';
  for (const r of records) {
    h += '<tr>';
    h += '<td class="mono">#' + r.record_id + '</td>';
    h += '<td><strong>' + r.name + '</strong></td>';
    h += '<td><span class="badge ' + badgeClass(r.status) + '">' + statusLabel(r.status) + '</span></td>';
    h += '<td class="mono">' + r.resolved_field_count + '</td>';
    h += '<td class="mono">$' + fmt(r.total_cost_usd, 6) + '</td>';
    h += '<td class="mono">' + fmt(r.total_latency_ms, 1) + ' ms</td>';
    h += '<td>' + r.created_at + '</td>';
    h += '<td><button class="btn-outline" onclick="toggleTrace(' + r.record_id + ', this)">Trace</button></td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  el.innerHTML = h;
}

async function toggleTrace(recordId, btn) {
  const row = btn.closest('tr');
  const existing = row.nextElementSibling;
  if (existing && existing.classList.contains('trace-row')) {
    existing.remove();
    btn.textContent = 'Trace';
    return;
  }

  try {
    const resp = await fetch('/api/records/' + recordId + '/trace');
    if (!resp.ok) {
      alert('Failed to fetch trace');
      return;
    }
    const trace = await resp.json();
    const tr = document.createElement('tr');
    tr.classList.add('trace-row');
    let h = '<td colspan="8">';
    if (!trace.length) {
      h += '<div class="empty-state">No trace events.</div>';
    } else {
      for (const ev of trace) {
        h += '<div class="trace-event"><strong>' + ev.node + '</strong> <span class="mono">' + ev.timestamp + '</span>';
        h += '<pre>' + JSON.stringify(ev.detail, null, 2) + '</pre></div>';
      }
    }
    h += '</td>';
    tr.innerHTML = h;
    row.after(tr);
    btn.textContent = 'Hide';
  } catch (err) {
    alert('Network error: ' + err.message);
  }
}

document.getElementById('enrich-form').addEventListener('submit', handleSubmit);
refreshRuns();
</script>
</body>
</html>
